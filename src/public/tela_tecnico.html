<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="images/icone.png" type="image/png" />
  <title>Sistema Merlin</title>
  <link rel="stylesheet" href="css/style7.css" />
  <script src="https://kit.fontawesome.com/915b45d802.js" crossorigin="anonymous"></script>
</head>

<body>
  <div id="header">
    <header id="menu-container"></header>
  </div>
  <div class="painel-gestao-solicitacoes">
    <h1>Solicitações de aulas</h1>
    <p style="text-align: center; color: #666">
      Abaixo estão as aulas que aguardam a sua aprovação.
    </p>

    <div class="container-filtros">
      <label>
        <input type="radio" name="filtroStatus" value="analisando" checked />
        Apenas Pendentes (Em Análise)
      </label>
      <label>
        <input type="radio" name="filtroStatus" value="todas" /> Histórico
        Completo (Todas)
      </label>
    </div>

    <h2 style="
          margin-top: 30px;
          border-bottom: 2px solid #569af9;
          padding-bottom: 5px;
        ">
      Aulas Recorrentes
    </h2>
    <div id="container-recorrentes" style="margin-top: 20px"></div>

    <h2 style="
          margin-top: 40px;
          border-bottom: 2px solid #569af9;
          padding-bottom: 5px;
        ">
      Aulas Individuais
    </h2>
    <div class="container-tabela-responsiva" style="margin-top: 20px">
      <div id="corpo-tabela-individuais" class="lista-cards-aulas"></div>
    </div>
  </div>

  <div id="modal-justificativa" class="modal-overlay" style="display: none">
    <div class="modal-content">
      <h2>Justificativa de Recusa</h2>
      <p style="font-size: 0.9rem; color: #666">
        Por favor, informe o motivo para não autorizar esta(s) aula(s):
      </p>
      <textarea id="texto-justificativa" rows="4"
        placeholder="Ex: Falta de reagentes, conflito de horários..."></textarea>
      <div class="modal-actions">
        <button id="btn-cancelar-recusa" class="btn-cancelar">
          Cancelar
        </button>
        <button id="btn-confirmar-recusa" class="btn-confirmar">
          Confirmar Recusa
        </button>
      </div>
    </div>
  </div>

  <script src="js/tela_tecnico.js" defer></script>
  <script src="js/menu.js" defer></script>
  <script src="/js/auth-guard.js" defer></script>
</body>

</html>
