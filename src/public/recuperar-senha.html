<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir Senha - Sistema Merlin</title>
  <link rel="icon" href="images/icone.png" type="image/png" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://kit.fontawesome.com/915b45d802.js" crossorigin="anonymous"></script>
  <style>
    /* Mesmo CSS padrão do seu sistema */
    body {
      background-color: #094412;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .redefinir-box {
      background: #ffffff;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 450px;
    }
    .redefinir-box h2 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
    }
    .redefinir-box p {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .inputBox {
      position: relative;
      margin-bottom: 25px;
      width: 100%;
    }
    .inputBox input {
      width: 100%;
      padding: 10px 0;
      font-size: 16px;
      color: #333;
      border: none;
      border-bottom: 2px solid #ccc;
      outline: none;
      background: transparent;
      transition: 0.3s;
    }
    .inputBox input:focus {
      border-bottom: 2px solid #007bff;
    }
    .inputBox label {
      position: absolute;
      top: 0;
      left: 0;
      padding: 10px 0;
      font-size: 16px;
      color: #999;
      pointer-events: none;
      transition: 0.3s ease;
    }
    .inputBox input:focus~label,
    .inputBox input:valid~label {
      top: -20px;
      font-size: 12px;
      color: #007bff;
      font-weight: bold;
    }
    button[type="submit"] {
      width: 100%;
      background: #007bff;
      color: #fff;
      border: none;
      padding: 12px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s;
      font-weight: bold;
    }
    button[type="submit"]:hover {
      background: #0056b3;
    }
    #mensagem-retorno {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
      display: none;
    }
    .btn-voltar {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #666;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }
    .btn-voltar:hover {
      color: #333;
    }
  </style>
</head>

<body>
  <div class="redefinir-box">
    <h2><i class="fa-solid fa-lock"></i> Redefinir Senha</h2>
    <p>Atenção: Ao alterar sua senha, seu usuário ficará <b>desativado</b> até que um administrador aprove novamente.</p>

    <form id="form-redefinir">
      <div class="inputBox">
        <input type="email" id="email" required />
        <label>Email Cadastrado</label>
      </div>

      <div class="inputBox">
        <input type="password" id="nova_senha" maxlength="12" required />
        <label>Nova Senha (Máx. 12 caracteres)</label>
      </div>

      <div class="inputBox">
        <input type="password" id="confirma_senha" maxlength="12" required />
        <label>Confirmar Nova Senha</label>
      </div>

      <button type="submit" id="btn-submit">Salvar Nova Senha</button>
      <div id="mensagem-retorno"></div>
    </form>

    <a href="/login.html" class="btn-voltar"><i class="fa-solid fa-arrow-left"></i> Voltar ao Login</a>
  </div>

  <script src="js/redefinir-senha.js"></script>
</body>

</html>
