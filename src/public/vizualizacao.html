<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="images/icone.png" type="image/png" />
    <title>Sistema Merlin - Grade de Aulas</title>
    <link rel="stylesheet" href="css/style7.css" />
    <script src="https://kit.fontawesome.com/915b45d802.js" crossorigin="anonymous"></script>
</head>

<body style="background-color: white;">
    <div class="menu">
        <header id="menu-container"></header>
    </div>

    <div class="container">
        <div class="row">
            <h1 style="margin-right: 30px;">Visão Geral dos Laboratórios</h1>
            <div class="filtros-container">
                <select id="filtroProfessor" onchange="aplicarFiltros()">
                    <option value="todos">👨‍🏫 Todos os Professores</option>
                </select>

                <select id="filtroLaboratorio" onchange="aplicarFiltros()">
                    <option value="todos">🔬 Todos os Laboratórios</option>
                </select>
                <button id="btnBaixarPdf" onclick="baixarRelatorioAulas()" class="btn-pdf">
                    <i class="fa-solid fa-file-pdf"></i> Baixar Relatório (PDF)
                </button>
            </div>
            <div class="dashboard-container">
                <div class="chart-card">
                    <div class="chart-title">Aulas por Professor</div>
                    <div class="chart-container"><canvas id="graficoProfessor"></canvas></div>
                </div>

                <div class="chart-card">
                    <div class="chart-title">Aulas por Laboratório</div>
                    <div class="chart-container"><canvas id="graficoLaboratorio"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">Aulas por Disciplina</div>
                    <div class="chart-container"><canvas id="graficoDisciplina"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">Distribuição por Horários</div>
                    <div class="chart-container"><canvas id="graficoHorario"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">Pico de Fluxo (Alunos por Horário)</div>
                    <div class="chart-container"><canvas id="graficoFluxoAlunos"></canvas></div>
                </div>

                <div class="chart-card">
                    <div class="chart-title">Média de Alunos por Laboratório</div>
                    <div class="chart-container"><canvas id="graficoMediaAlunosLab"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">Status: Autorizadas vs Não Autorizadas</div>
                    <div class="chart-container"><canvas id="graficoStatus"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">Aulas que Precisam de Técnico</div>
                    <div class="chart-container"><canvas id="graficoTecnico"></canvas></div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/vizualizacao.js" defer></script>
    <script src="js/menu.js" defer></script>
    <script src="/js/auth-guard.js" defer></script>
</body>

</html>
