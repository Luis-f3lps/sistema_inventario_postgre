<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/icone3.png" type="image/png">
    <title>Inventário Produtos Químicos</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/915b45d802.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <div class="login-box">
            <img src="images/logomenulogin.png" class="logo">
            <h2>Login</h2>
            <form id="login-form" style="text-align: center;">
                <div class="inputBox">
                    <input type="text" name="email" required="">
                    <span>Email</span>
                </div>
                <div class="inputBox">
                    <input type="password" id="password" name="senha" required="">
                    <span>Senha</span>
                    <div id="toggle" onclick="showHide();"></div>
                </div>
                <button type="submit" name="acao" value="logar">Entrar</button>
                <div id="error-message" style="color: red; display: none; width: 320px;"></div>
                <a href="/novo-usuario" class="link-novo-usuario">Novo Usuário</a>
            </form>
        </div>
    </div>
    <script src="js/login.js"></script>
    <script src="/js/auth-guard.js" defer></script>
</body>

</html>
