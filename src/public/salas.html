<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="images/icone.png" type="image/png">
    <title>Salas de Aula</title>
    <link rel="stylesheet" href="css/style7.css">
    <script src="https://kit.fontawesome.com/915b45d802.js" crossorigin="anonymous"></script>
    <script src="js/auth-guard.js" defer></script>
</head>

<body>
    <div class="menu">
        <header id="menu-container"></header>
    </div>

    <div class="container">
        <div class="row">
            <div class="about-col-2">
                <h1 class="sub-title">Salas de Aula</h1>
                <br>
                <div class="tab-titles">
                    <p class="tab-links active-link" onclick="opentab('todos')">Todas as Salas</p>
                    <p class="tab-links" onclick="opentab('adicionar')">Adicionar Sala</p>
                    <p class="tab-links" onclick="opentab('alterar')">Alterar Responsável da Sala</p>
                    <p class="tab-links" onclick="opentab('remover')">Remover Sala</p>
                </div>

                <div class="tab-contents active-tab" id="todos">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome da Sala</th>
                                <th>Responsável</th>
                                <th>Email</th>
                            </tr>
                        </thead>
                        <tbody id="sala-tbody">
                            </tbody>
                    </table>
                    <div id="pagination">
                        </div>
                </div>
                
                <div class="tab-contents" id="adicionar">
                    <div class="form-container">
                        <h2>Adicionar Sala de Aula</h2>
                        <br>
                        <form id="add-sala-form">
                            <div class="form-group">
                                <label for="nome_sala">Nome da Sala:</label>
                                <input type="text" id="nome_sala" name="nome_sala" placeholder="Ex: Sala 101, Auditório" required>
                            </div>
                            <div class="form-group">
                                <label for="usuarios">Selecione um responsável:</label>
                                <select id="usuarios-select" name="usuarios" required>
                                    </select>
                            </div>
                            <button type="submit">Adicionar Sala</button>
                        </form>
                    </div>
                </div>

                <div class="tab-contents" id="alterar">
                    <div class="form-container">
                        <h2>Alterar Responsável da Sala</h2>
                        <br>
                        <form id="update-responsavel-form">
                            <div class="form-group">
                                <label for="salas">Selecione uma Sala:</label>
                                <select id="salas-select2" name="salas" required>
                                    </select>
                            </div>
                            <div class="form-group">
                                <label for="usuarios">Selecione o Novo Responsável:</label>
                                <select id="usuarios-select2" name="usuarios" required>
                                    </select>
                            </div>
                            <button type="submit">Atualizar Responsável</button>
                        </form>
                    </div>
                </div>

                <div class="tab-contents" id="remover">
                    <div class="form-container">
                        <h1>Remover Sala de Aula</h1>
                        <br><br>
                        <form id="remove-sala-form">
                            <label for="salas">Selecione uma sala:</label>
                            <select id="remove-sala" name="salas" required>
                                </select>
                            <br><br><br>
                            <button type="submit" class="btn-remover">Remover Sala</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/salas.js"></script>
    <script src="js/menu.js" defer></script>
    <script src="/js/auth-guard.js" defer></script>
</body>

</html>
